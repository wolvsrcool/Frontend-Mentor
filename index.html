<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        font-size: 62.5%;
      }

      body {
        background-color: #edf2ff;
      }

      .grid-container {
        max-width: 100vw;
        margin: 4rem;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 4rem;
      }

      img {
        width: 100%;
        transform: scale(1.01);
        transition: 0.3s;
      }

      .challenge:hover {
        transform: translateY(-2rem);
      }

      .challenge:hover img {
        transform: scale(1.05);
      }

      .challenge {
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 0 6.4rem rgba(0, 0, 0, 0.05);
        border: 2px solid #bac8ff;
        transition: 0.3s;
      }

      @media (max-width: 100em) {
        .grid-container {
          grid-template-columns: repeat(3, 1fr);
        }
      }

      @media (max-width: 75em) {
        .grid-container {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 50em) {
        .grid-container {
          grid-template-columns: repeat(1, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="grid-container">
        <div class="challenge">
          <p>
            <a href="recipe-page-main/index.html"
              ><img src="recipe-page-main/preview.jpg" alt=""
            /></a>
          </p>
        </div>
        <div class="challenge" href>
          <p>
            <a href="social-links-profile-main/index.html"
              ><img src="social-links-profile-main/preview.jpg" alt=""
            /></a>
          </p>
        </div>
        <div class="challenge" href>
          <p>
            <a href="results-summary-component-main/index.html"
              ><img src="results-summary-component-main/preview.jpg" alt=""
            /></a>
          </p>
        </div>
        <div class="challenge" href>
          <p>
            <a href="testimonials-grid-section-main/index.html"
              ><img src="testimonials-grid-section-main/preview.jpg" alt=""
            /></a>
          </p>
        </div>
        <div class="challenge" href>
          <p>
            <a href="bento-grid-main/index.html"
              ><img src="bento-grid-main/preview.jpg" alt=""
            /></a>
          </p>
        </div>
        <div class="challenge" href>
          <p>
            <a href="fylo-data-storage-component-master/index.html"
              ><img src="fylo-data-storage-component-master/preview.jpg" alt=""
            /></a>
          </p>
        </div>
      </div>
    </main>
  </body>
</html>
